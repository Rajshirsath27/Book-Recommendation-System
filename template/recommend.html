<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recommend Books</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

.navbar{
    background:#1e293b;
}

.book-card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    transition:0.3s;
}

.book-card:hover{
    transform:translateY(-8px);
    box-shadow:0px 10px 25px rgba(0,0,0,0.4);
}

.book-img{
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.search-box{
    max-width:600px;
    margin:auto;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand">📚 Book Recommender</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/recommend">Recommend</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/contact">contact</a>
</li>

<!-- <li><a href="/contact">Contact</a></li>
</ul> -->

</div>
</nav>

<div class="container mt-5">

<h1 class="text-center mb-4">Find Similar Books</h1>

<div class="search-box">

<form action="/recommend_books" method="post">

<div class="input-group input-group-lg">

<input type="text" name="user_input" class="form-control" placeholder="Enter Book Name">

<button class="btn btn-warning">Recommend</button>

</div>

<!-- Show Error Message in UI -->
{% if error %}
<div class="alert alert-danger mt-4">
{{ error }}
</div>
{% endif %} 

</form>

</div>

<div class="row g-4 mt-5">

{% if data %}

{% for i in data %}

<div class="col-lg-3 col-md-4 col-sm-6">

<div class="book-card text-center">

<img src="{{i[2]}}" class="img-fluid book-img">

<h5 class="mt-3">{{i[0]}}</h5>

<p class="text-muted">{{i[1]}}</p>

</div>

</div>

{% endfor %}

{% endif %}

</div>

</div>

</body>
</html>
