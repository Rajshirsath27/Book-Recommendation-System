<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Recommendation System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Poppins', sans-serif;
    background:#0f172a;
    color:white;
}

.navbar{
    background:#1e293b;
}

.navbar-brand{
    font-weight:600;
    font-size:22px;
}

.book-card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    transition:0.3s;
}

.book-card:hover{
    transform:translateY(-8px);
    box-shadow:0px 10px 25px rgba(0,0,0,0.4);
}

.book-img{
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.section-title{
    font-size:40px;
    font-weight:600;
    margin-bottom:30px;
}

.rating{
    color:#facc15;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand">📚 Book Recommender</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/recommend">Recommend</a>
</li>
<!-- new  -->
<li class="nav-item">
<a class="nav-link" href="/contact">contact</a>
</li>


</div>
</nav>


<div class="container mt-5">

<h1 class="section-title text-center">Top Rated Books</h1>

<div class="row g-4">

{% for i in range(book_name|length) %}

<div class="col-lg-3 col-md-4 col-sm-6">

<!-- <div class="book-card text-center">

<img src="{{ image[i] }}" class="img-fluid book-img">

<h5 class="mt-3">{{ book_name[i] }}</h5>

<p class="text-muted">{{ author[i] }}</p>

<p>Votes : {{ votes[i] }}</p>

<p class="rating">⭐ {{ rating[i] }}</p>

</div> -->


<div class="book-card text-center">

<img src="{{ image[i] }}" class="img-fluid book-img">

<h5 class="mt-3">{{ book_name[i] }}</h5>

<p style="color:#cbd5e1;">Author: {{ author[i] }}</p>

<p>Votes: {{ votes[i] }}</p>

<p class="rating">⭐ {{ "%.2f"|format(rating[i]) }} / 10</p>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
